<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Keranjang Belanja</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
padding-bottom:170px;
}

header{
background:#15803d;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

.card{
background:white;
margin:10px;
padding:12px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.harga{
color:#15803d;
font-weight:bold;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
margin:3px;
cursor:pointer;
}

.green{background:#15803d;color:white}
.gray{background:#9ca3af;color:white}

#map{
height:260px;
margin:10px;
border-radius:10px;
}

input{
width:95%;
margin:10px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.checkout{
position:fixed;
left:15px;
bottom:90px;
background:#16a34a;
color:white;
padding:12px 18px;
border-radius:30px;
font-weight:bold;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
z-index:999;
}

.clearBtn{
position:fixed;
left:15px;
bottom:30px;
background:#9ca3af;
color:white;
padding:12px 18px;
border-radius:30px;
font-weight:bold;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
z-index:999;
}

</style>
</head>

<body>

<header>🛒 Keranjang Belanja</header>

<div id="cartList"></div>

<h3 style="margin-left:10px;">📍 Pilih Lokasi Pengiriman</h3>

<div id="map"></div>

<button class="green" onclick="gunakanLokasi()" style="margin-left:10px;">
📡 Gunakan Lokasi Saya
</button>

<div id="infoZona" class="card">Belum memilih lokasi</div>

<input type="tel" id="waPembeli" placeholder="Nomor WhatsApp Aktif">

<div class="checkout" onclick="lanjutBayar()">🛒 Checkout</div>

<div class="clearBtn" onclick="kosongkan()">🗑 Kosongkan</div>

<script>

// ================= DATA =================

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const tokoLat = -6.883831;
const tokoLng = 108.302788;

let tujuanLat=null;
let tujuanLng=null;
let ongkir=0;
let minimalBelanja=0;

let namaDesa="-";
let namaKecamatan="-";

let markerUser=null;

function rupiah(a){
return Math.round(a).toLocaleString("id-ID");
}

// ================= RENDER CART =================

function renderCart(){

let list=document.getElementById("cartList");

list.innerHTML="";

let total=0;

cart.forEach((p,i)=>{

let sub=p.harga*p.qty;

total+=sub;

list.innerHTML+=`
<div class="card">
<b>${p.nama}</b><br>
<span class="harga">Rp ${rupiah(p.harga)}</span><br>

<button onclick="kurang(${i})">-</button>
${p.qty}
<button onclick="tambah(${i})">+</button>
<button onclick="hapus(${i})">Hapus</button>

<br>Subtotal: Rp ${rupiah(sub)}

</div>
`;

});

let totalBayar=total+ongkir;

list.innerHTML+=`
<div class="card">

<b>Total Barang : Rp ${rupiah(total)}</b><br>
<b>Ongkir : Rp ${rupiah(ongkir)}</b>

<hr>

<b style="color:#15803d;font-size:18px">
TOTAL BAYAR : Rp ${rupiah(totalBayar)}
</b>

</div>
`;

}

function tambah(i){
cart[i].qty++;
simpan();
}

function kurang(i){
cart[i].qty--;
if(cart[i].qty<=0) cart.splice(i,1);
simpan();
}

function hapus(i){
cart.splice(i,1);
simpan();
}

function simpan(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function kosongkan(){
localStorage.removeItem("cart");
location.reload();
}

// ================= CHECKOUT =================

function lanjutBayar(){

if(cart.length===0){
alert("Keranjang masih kosong");
return;
}

if(!tujuanLat){
alert("Pilih lokasi pengiriman dulu");
return;
}

let total=0;

cart.forEach(p=>{
total+=p.harga*p.qty;
});

if(minimalBelanja>0 && total<minimalBelanja){
alert("Minimal belanja Rp "+rupiah(minimalBelanja));
return;
}

let noWa=document.getElementById("waPembeli").value.trim();

noWa=noWa.replace(/\D/g,'');

if(noWa.startsWith("0")){
noWa="62"+noWa.substring(1);
}

if(noWa.startsWith("8")){
noWa="62"+noWa;
}

if(noWa.length<10){
alert("Nomor WhatsApp tidak valid");
return;
}

localStorage.setItem("checkoutData",JSON.stringify({

lat:tujuanLat,
lng:tujuanLng,
desa:namaDesa,
kecamatan:namaKecamatan,
ongkir:ongkir,
noWa:noWa

}));

window.location.href="bayar.html";

}

// ================= MAP =================

var map=L.map('map').setView([tokoLat,tokoLng],15);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

L.marker([tokoLat,tokoLng]).addTo(map)
.bindPopup("🏪 Lokasi Toko")
.openPopup();

map.on('click',function(e){

setLokasi(e.latlng.lat,e.latlng.lng);

});

function gunakanLokasi(){

navigator.geolocation.getCurrentPosition(function(pos){

setLokasi(pos.coords.latitude,pos.coords.longitude);

},function(){

alert("GPS tidak aktif, klik lokasi di peta");

});

}

// ================= SET LOKASI =================

function setLokasi(lat,lng){

tujuanLat=lat;
tujuanLng=lng;

if(markerUser) map.removeLayer(markerUser);

markerUser=L.marker([lat,lng]).addTo(map);

let jarak=map.distance([tokoLat,tokoLng],[lat,lng])/1000;

ongkir=Math.ceil(jarak*2000);

if(ongkir<5000) ongkir=5000;

if(jarak<=10){
minimalBelanja=0;
}else if(jarak<=20){
minimalBelanja=200000;
}else{
minimalBelanja=300000;
}

document.getElementById("infoZona").innerHTML=

"Jarak : "+jarak.toFixed(1)+" km<br>"+
"Ongkir : Rp "+rupiah(ongkir)+"<br>"+
"Minimal Belanja : Rp "+rupiah(minimalBelanja);

renderCart();

}

renderCart();

</script>

</body>
</html>
