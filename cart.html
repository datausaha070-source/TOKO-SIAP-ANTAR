<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Keranjang Belanja</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
padding-bottom:160px;
}

header{
background:#15803d;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

.card{
background:white;
margin:10px;
padding:12px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.harga{
color:#15803d;
font-weight:bold;
}

#map{
height:260px;
margin:10px;
border-radius:10px;
}

input{
width:95%;
margin:10px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

/* tombol melayang */

.checkout{
position:fixed;
left:15px;
bottom:90px;
background:#16a34a;
color:white;
padding:12px 18px;
border-radius:30px;
font-weight:bold;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
z-index:999;
}

.clearBtn{
position:fixed;
left:15px;
bottom:30px;
background:#9ca3af;
color:white;
padding:12px 18px;
border-radius:30px;
font-weight:bold;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
z-index:999;
}

</style>
</head>

<body>

<header>🛒 Keranjang Belanja</header>

<div id="cartList"></div>

<h3 style="margin-left:10px;">📍 Pilih Lokasi Pengiriman</h3>

<div id="map"></div>

<button onclick="gunakanLokasi()" style="margin-left:10px;">
📡 Gunakan Lokasi Saya
</button>

<div id="infoZona" class="card">Belum memilih lokasi</div>

<input type="tel" id="waPembeli" placeholder="Nomor WhatsApp Aktif">

<div class="checkout" id="btnCheckout" onclick="lanjutBayar()">🛒 Checkout</div>

<div class="clearBtn" onclick="kosongkan()">🗑 Kosongkan</div>

<script>

// ================= DATA =================

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const tokoLat=-6.883831;
const tokoLng=108.302788;

let tujuanLat=null;
let tujuanLng=null;

let ongkir=0;
let minimalBelanja=0;

let namaDesa="-";
let namaKecamatan="-";

let markerUser=null;
let markerMotor=null;

// ================= FORMAT RUPIAH =================

function rupiah(a){
return Math.round(a).toLocaleString("id-ID");
}

// ================= RENDER CART =================

function renderCart(){

let list=document.getElementById("cartList");

list.innerHTML="";

let total=0;

cart.forEach((p,i)=>{

let sub=p.harga*p.qty;

total+=sub;

list.innerHTML+=`
<div class="card">

<b>${p.nama}</b><br>

<span class="harga">
Rp ${rupiah(p.harga)}
</span><br>

<button onclick="kurang(${i})">-</button>
${p.qty}
<button onclick="tambah(${i})">+</button>

<button onclick="hapus(${i})">Hapus</button>

<br>Subtotal: Rp ${rupiah(sub)}

</div>
`;

});

let totalBayar=total+ongkir;

list.innerHTML+=`
<div class="card">

<b>Total Barang : Rp ${rupiah(total)}</b><br>

<b>Ongkir : Rp ${rupiah(ongkir)}</b>

<hr>

<b style="color:#15803d;font-size:18px">

TOTAL BAYAR : Rp ${rupiah(totalBayar)}

</b>

</div>
`;

kontrolCheckout(total);

}

// ================= EDIT CART =================

function tambah(i){
cart[i].qty++;
simpan();
}

function kurang(i){
cart[i].qty--;
if(cart[i].qty<=0)cart.splice(i,1);
simpan();
}

function hapus(i){
cart.splice(i,1);
simpan();
}

function kosongkan(){
localStorage.removeItem("cart");
location.reload();
}

function simpan(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

// ================= CHECKOUT CONTROL =================

function kontrolCheckout(total){

let btn=document.getElementById("btnCheckout");

let noWa=document.getElementById("waPembeli").value.trim();

if(!tujuanLat || !noWa || total<minimalBelanja){

btn.style.background="#9ca3af";
btn.style.pointerEvents="none";

}else{

btn.style.background="#16a34a";
btn.style.pointerEvents="auto";

}

}

// ================= LANJUT BAYAR =================

function lanjutBayar(){

let noWa=document.getElementById("waPembeli").value.trim();

noWa=noWa.replace(/\D/g,'');

if(noWa.startsWith("0")){
noWa="62"+noWa.substring(1);
}

localStorage.setItem("checkoutData",JSON.stringify({

lat:tujuanLat,
lng:tujuanLng,
desa:namaDesa,
kecamatan:namaKecamatan,
ongkir:ongkir,
noWa:noWa

}));

window.location.href="bayar.html";

}

// ================= MAP =================

var map=L.map('map').setView([tokoLat,tokoLng],15);

var normalLayer=L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}).addTo(map);

var satelliteLayer=L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19});

var satelitNama=L.layerGroup([satelliteLayer]);

L.control.layers({
"Peta Normal":normalLayer,
"Satelit":satelliteLayer,
"Satelit + Nama":satelitNama
}).addTo(map);

// ================= ICON =================

var tokoIcon=L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/535/535137.png",
iconSize:[35,35],
iconAnchor:[17,35]
});

var motorIcon=L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/2972/2972185.png",
iconSize:[40,40],
iconAnchor:[20,40]
});

L.marker([tokoLat,tokoLng],{icon:tokoIcon})
.addTo(map)
.bindPopup("🏪 Lokasi Toko")
.openPopup();

map.on('click',function(e){
setLokasi(e.latlng.lat,e.latlng.lng);
});

// ================= GPS =================

function gunakanLokasi(){

navigator.geolocation.getCurrentPosition(function(pos){

setLokasi(pos.coords.latitude,pos.coords.longitude);

});

}

// ================= SET LOKASI =================

function setLokasi(lat,lng){

tujuanLat=lat;
tujuanLng=lng;

if(markerUser)map.removeLayer(markerUser);

markerUser=L.marker([lat,lng])
.addTo(map)
.bindPopup("Lokasi Pengiriman")
.openPopup();

map.setView([lat,lng],17);

// garis rute

if(window.garis)map.removeLayer(window.garis);

window.garis=L.polyline([
[tokoLat,tokoLng],
[lat,lng]
],{
color:"#15803d",
weight:4
}).addTo(map);

// radius

if(window.radius)map.removeLayer(window.radius);

window.radius=L.circle([tokoLat,tokoLng],{
radius:30000,
color:"#f97316",
fillOpacity:0.08
}).addTo(map);

// ambil alamat

fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
.then(res=>res.json())
.then(data=>{

namaDesa=data.address.village||data.address.suburb||"-";
namaKecamatan=data.address.subdistrict||data.address.county||"-";

hitungOngkir();
animasiMotor();

});

}

// ================= MOTOR =================

function animasiMotor(){

if(markerMotor)map.removeLayer(markerMotor);

markerMotor=L.marker([tokoLat,tokoLng],{icon:motorIcon}).addTo(map);

let steps=60;

let latStep=(tujuanLat-tokoLat)/steps;
let lngStep=(tujuanLng-tokoLng)/steps;

let i=0;

let jalan=setInterval(function(){

let lat=tokoLat+latStep*i;
let lng=tokoLng+lngStep*i;

markerMotor.setLatLng([lat,lng]);

i++;

if(i>steps)clearInterval(jalan);

},100);

}

// ================= ONGKIR =================

function hitungOngkir(){

let jarak=map.distance([tokoLat,tokoLng],[tujuanLat,tujuanLng])/1000;

const bensin=10000;
const kmPerLiter=40;

const biayaKm=(bensin/kmPerLiter)*2*4;

ongkir=Math.ceil(jarak*biayaKm/1000)*1000;

if(ongkir<5000)ongkir=5000;

let totalBarang=0;

cart.forEach(p=>{
totalBarang+=p.harga*p.qty;
});

if(totalBarang>=500000){
ongkir=0;
}

if(jarak<=10)minimalBelanja=0;
else if(jarak<=20)minimalBelanja=200000;
else minimalBelanja=300000;

let estimasi=Math.ceil(jarak*3);

document.getElementById("infoZona").innerHTML=

"Jarak: "+jarak.toFixed(1)+" km<br>"+
"Ongkir: Rp "+rupiah(ongkir)+"<br>"+
"Minimal Belanja: Rp "+rupiah(minimalBelanja)+"<br>"+
"Estimasi Antar: ±"+estimasi+" menit<br>"+
"Desa: "+namaDesa+"<br>"+
"Kecamatan: "+namaKecamatan;

renderCart();

}

renderCart();

</script>

</body>
</html>
