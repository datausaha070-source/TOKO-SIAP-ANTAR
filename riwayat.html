<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Riwayat Pesanan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#15803d;
color:white;
padding:16px;
font-weight:bold;
text-align:center;
}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.id{
font-size:12px;
color:#777;
}

.total{
color:#16a34a;
font-weight:bold;
font-size:16px;
}

.empty{
text-align:center;
padding:40px;
color:#888;
}

</style>
</head>

<body>

<header>
📦 Riwayat Pesanan
</header>

<div id="listRiwayat"></div>

<script>

let data = JSON.parse(localStorage.getItem("riwayatPesanan")) || [];

let box = document.getElementById("listRiwayat");

if(data.length==0){

box.innerHTML=
`<div class="empty">
Belum ada riwayat pesanan
</div>`;

}else{

data.forEach(p=>{

box.innerHTML+=`

<div class="card">

<div class="id">
ID Pesanan : #${p.id}
</div>

Tanggal : ${p.tanggal} ${p.jam}<br>

Jumlah Item : ${p.item}<br>

<div class="total">
Total : Rp ${p.total.toLocaleString("id-ID")}
</div>

Status : ${p.status}

</div>

`;

});

}

</script>

</body>
</html>
